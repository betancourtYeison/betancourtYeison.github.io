name: CI

# Validates every pull request targeting develop: formatting, tests and a
# production build must all pass before merge.

on:
  pull_request:
    branches: [develop]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm run check-format

      - name: Run tests
        run: pnpm test

      - name: Build
        run: pnpm run build
